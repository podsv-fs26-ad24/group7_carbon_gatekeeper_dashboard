<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" font-family="Inter, Arial, sans-serif">
  <rect width="1200" height="1400" fill="#FFFFFF"/>

  <!-- Legend -->
  <g transform="translate(960, 20)">
    <rect x="0" y="0" width="220" height="80" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="1" rx="4"/>
    <text x="12" y="20" font-size="11" font-weight="600" fill="#374151">Legend</text>
    <line x1="12" y1="38" x2="40" y2="38" stroke="#9CA3AF" stroke-width="1"/>
    <text x="48" y="42" font-size="10" fill="#6B7280">layout annotation</text>
    <line x1="12" y1="58" x2="40" y2="58" stroke="#DB2777" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="48" y="62" font-size="10" fill="#DB2777">coordinated view link</text>
  </g>

  <!-- SIDEBAR -->
  <rect x="30" y="30" width="160" height="1340" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="110" y="55" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">SIDEBAR</text>
  <rect x="50" y="80" width="120" height="60" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="3,2" rx="3"/>
  <text x="110" y="115" font-size="10" fill="#6B7280" text-anchor="middle">File upload</text>
  <text x="110" y="128" font-size="9" fill="#9CA3AF" text-anchor="middle">(historical)</text>
  <rect x="50" y="155" width="120" height="60" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="3,2" rx="3"/>
  <text x="110" y="190" font-size="10" fill="#6B7280" text-anchor="middle">File upload</text>
  <text x="110" y="203" font-size="9" fill="#9CA3AF" text-anchor="middle">(planned)</text>
  <rect x="50" y="235" width="120" height="55" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" rx="3"/>
  <text x="110" y="265" font-size="10" fill="#6B7280" text-anchor="middle">CO2 metric</text>
  <text x="110" y="278" font-size="9" fill="#9CA3AF" text-anchor="middle">(radio)</text>

  <!-- MAIN CANVAS -->
  <rect x="260" y="30" width="680" height="40" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="600" y="55" font-size="12" fill="#6B7280" text-anchor="middle">Title + subtitle</text>
  <rect x="260" y="85" width="680" height="30" fill="#FAFAFA" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="600" y="104" font-size="11" fill="#6B7280" text-anchor="middle">Metadata strip</text>

  <!-- 1. OVERVIEW -->
  <text x="260" y="148" font-size="13" font-weight="600" fill="#374151">1. Overview</text>
  <line x1="260" y1="155" x2="940" y2="155" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="260" y="170" width="160" height="80" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="340" y="215" font-size="11" fill="#6B7280" text-anchor="middle">KPI</text>
  <rect x="430" y="170" width="160" height="80" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="510" y="215" font-size="11" fill="#6B7280" text-anchor="middle">KPI</text>
  <rect x="600" y="170" width="160" height="80" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="680" y="215" font-size="11" fill="#6B7280" text-anchor="middle">KPI</text>
  <rect x="770" y="170" width="170" height="80" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="855" y="215" font-size="11" fill="#6B7280" text-anchor="middle">KPI</text>
  <rect x="260" y="265" width="680" height="28" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="600" y="284" font-size="11" fill="#6B7280" text-anchor="middle">Status banner</text>
  <line x1="940" y1="210" x2="970" y2="210" stroke="#9CA3AF" stroke-width="1"/>
  <text x="975" y="207" font-size="10" fill="#6B7280" font-style="italic">4-column</text>
  <text x="975" y="219" font-size="10" fill="#6B7280" font-style="italic">KPI grid</text>

  <!-- 2. BU PERFORMANCE -->
  <text x="260" y="330" font-size="13" font-weight="600" fill="#374151">2. Budget compliance by Business Unit</text>
  <line x1="260" y1="337" x2="940" y2="337" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="260" y="355" width="180" height="100" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="350" y="410" font-size="11" fill="#6B7280" text-anchor="middle">Gauge BU1</text>
  <rect x="450" y="355" width="180" height="100" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="540" y="410" font-size="11" fill="#6B7280" text-anchor="middle">Gauge BU2</text>
  <rect x="260" y="465" width="180" height="100" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="350" y="520" font-size="11" fill="#6B7280" text-anchor="middle">Gauge BU3</text>
  <rect x="450" y="465" width="180" height="100" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="540" y="520" font-size="11" fill="#6B7280" text-anchor="middle">Gauge BU4</text>
  <rect x="645" y="355" width="295" height="210" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="792" y="465" font-size="11" fill="#6B7280" text-anchor="middle">BU bar chart</text>
  <text x="792" y="482" font-size="10" fill="#9CA3AF" text-anchor="middle">(current + saving + budget)</text>
  <rect x="260" y="580" width="160" height="22" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="3"/>
  <text x="340" y="595" font-size="10" fill="#6B7280" text-anchor="middle">BU1 status</text>
  <rect x="430" y="580" width="160" height="22" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="3"/>
  <text x="510" y="595" font-size="10" fill="#6B7280" text-anchor="middle">BU2 status</text>
  <rect x="600" y="580" width="160" height="22" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="3"/>
  <text x="680" y="595" font-size="10" fill="#6B7280" text-anchor="middle">BU3 status</text>
  <rect x="770" y="580" width="170" height="22" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="3"/>
  <text x="855" y="595" font-size="10" fill="#6B7280" text-anchor="middle">BU4 status</text>
  <line x1="940" y1="460" x2="970" y2="460" stroke="#9CA3AF" stroke-width="1"/>
  <text x="975" y="450" font-size="10" fill="#6B7280" font-style="italic">3 : 2 split</text>
  <text x="975" y="462" font-size="10" fill="#6B7280" font-style="italic">gauges (2x2)</text>
  <text x="975" y="474" font-size="10" fill="#6B7280" font-style="italic">+ bar chart</text>

  <!-- 3. GEOGRAPHY -->
  <text x="260" y="645" font-size="13" font-weight="600" fill="#374151">3. Geographic distribution</text>
  <line x1="260" y1="652" x2="940" y2="652" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="260" y="668" width="120" height="26" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" rx="3"/>
  <text x="320" y="685" font-size="10" fill="#6B7280" text-anchor="middle">Region</text>
  <rect x="260" y="705" width="680" height="200" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="600" y="810" font-size="11" fill="#6B7280" text-anchor="middle">Connection map</text>
  <line x1="940" y1="680" x2="970" y2="680" stroke="#9CA3AF" stroke-width="1"/>
  <text x="975" y="678" font-size="10" fill="#6B7280" font-style="italic">Region</text>
  <text x="975" y="690" font-size="10" fill="#6B7280" font-style="italic">selector</text>

  <!-- 4. REDUCTION LEVERS -->
  <text x="260" y="945" font-size="13" font-weight="600" fill="#374151">4. Reduction levers</text>
  <line x1="260" y1="952" x2="940" y2="952" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="260" y="970" width="160" height="100" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="340" y="1020" font-size="11" fill="#6B7280" text-anchor="middle">KPI</text>
  <text x="340" y="1035" font-size="10" fill="#9CA3AF" text-anchor="middle">(saving total)</text>
  <rect x="430" y="970" width="510" height="180" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="685" y="1055" font-size="11" fill="#6B7280" text-anchor="middle">Reduction-levers table</text>
  <text x="685" y="1072" font-size="10" fill="#9CA3AF" text-anchor="middle">(sortable, row-selectable)</text>
  <rect x="260" y="1095" width="160" height="35" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1" rx="4"/>
  <text x="340" y="1118" font-size="11" font-weight="500" fill="#374151" text-anchor="middle">[ Apply alternatives ]</text>

  <!-- Coordination arrows -->
  <path d="M 685 1150 L 685 1185" stroke="#DB2777" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
  <polygon points="685,1190 681,1182 689,1182" fill="#DB2777"/>
  <text x="700" y="1175" font-size="10" fill="#DB2777" font-style="italic">row click loads deep-dive</text>
  <path d="M 260 1112 L 200 1112" stroke="#DB2777" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
  <polygon points="195,1112 203,1108 203,1116" fill="#DB2777"/>
  <text x="195" y="1100" font-size="10" fill="#DB2777" font-style="italic" text-anchor="end">Apply: recomputes</text>
  <text x="195" y="1132" font-size="10" fill="#DB2777" font-style="italic" text-anchor="end">KPIs + gauges + banner</text>

  <!-- Route deep-dive -->
  <text x="260" y="1210" font-size="11" font-weight="500" fill="#6B7280">Route deep-dive</text>
  <rect x="260" y="1220" width="180" height="100" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="350" y="1275" font-size="11" fill="#6B7280" text-anchor="middle">Map inset</text>
  <rect x="450" y="1220" width="280" height="100" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="590" y="1275" font-size="11" fill="#6B7280" text-anchor="middle">CO2 + duration chart</text>
  <rect x="740" y="1220" width="200" height="100" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
  <text x="840" y="1275" font-size="11" fill="#6B7280" text-anchor="middle">Per-mode cards</text>
  <line x1="940" y1="1270" x2="970" y2="1270" stroke="#9CA3AF" stroke-width="1"/>
  <text x="975" y="1265" font-size="10" fill="#6B7280" font-style="italic">2 : 3 : 2</text>
  <text x="975" y="1277" font-size="10" fill="#6B7280" font-style="italic">deep-dive</text>
  <text x="975" y="1289" font-size="10" fill="#6B7280" font-style="italic">split</text>

  <!-- Narrative flow -->
  <text x="245" y="220" font-size="11" fill="#374151" font-weight="600" font-style="italic" text-anchor="end">overview</text>
  <text x="245" y="470" font-size="11" fill="#374151" font-weight="600" font-style="italic" text-anchor="end">insight</text>
  <text x="245" y="800" font-size="11" fill="#374151" font-weight="600" font-style="italic" text-anchor="end">context</text>
  <text x="245" y="1060" font-size="11" fill="#374151" font-weight="600" font-style="italic" text-anchor="end">action</text>
  <line x1="250" y1="240" x2="250" y2="1060" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2,3"/>
</svg>
